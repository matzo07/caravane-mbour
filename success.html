<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmation · Caravane Universitaire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold:      #e8b931;
      --deep-blue: #0d1f4a;
      --white:     #f9f5ec;
      --green:     #27ae60;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background: linear-gradient(135deg, #0a1428 0%, #1a2a5a 50%, #0f1f3d 100%);
      background-attachment: fixed;
      color: var(--white);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Beau fond élégant */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 30%, rgba(232,185,49,0.08) 0%, transparent 60%),
                  url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?ixlib=rb-4.0.3&auto=format&fit=crop&q=80') center/cover no-repeat;
      opacity: 0.25;
      z-index: 0;
      filter: brightness(0.85) contrast(1.1);
      pointer-events: none;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: linear-gradient(160deg, rgba(13,31,74,0.88), rgba(5,15,30,0.92));
    }

    /* ── PAGE ──────────────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    /* Le reste du CSS reste identique (animations, cartes, boutons...) */
    .checkmark-wrap {
      width: 90px; height: 90px; margin: 0 auto 24px;
      animation: popIn .6s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .checkmark-circle {
      stroke: var(--green); stroke-width: 3;
      stroke-dasharray: 166; stroke-dashoffset: 166;
      fill: none;
      animation: strokeDraw .6s .3s cubic-bezier(.65,0,.45,1) forwards;
    }
    .checkmark-check {
      stroke: var(--green); stroke-width: 3;
      stroke-linecap: round; stroke-linejoin: round;
      stroke-dasharray: 48; stroke-dashoffset: 48;
      fill: none;
      animation: strokeDraw .3s .9s ease forwards;
    }
    @keyframes strokeDraw { to { stroke-dashoffset: 0; } }

    .success-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800; color: var(--gold);
      margin-bottom: 6px;
      animation: fadeUp .6s .5s ease both;
    }
    .success-sub {
      font-size: 1rem; color: rgba(249,245,236,0.7);
      animation: fadeUp .6s .65s ease both;
    }
    @keyframes fadeUp {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .bus-card {
      background: rgba(10,15,40,0.72);
      border: 1px solid rgba(232,185,49,0.3);
      backdrop-filter: blur(16px);
      border-radius: 18px;
      padding: 32px 36px;
      width: 100%; max-width: 420px;
      margin: 28px 0 20px;
      animation: fadeUp .6s .8s ease both;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    .bus-number {
      font-family: 'Cinzel', serif;
      font-size: 4rem; font-weight: 800;
      color: var(--gold); line-height: 1;
      text-shadow: 0 0 30px rgba(232,185,49,0.6);
      animation: glowPulse 2.5s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%,100% { text-shadow: 0 0 20px rgba(232,185,49,0.4); }
      50%     { text-shadow: 0 0 45px rgba(232,185,49,0.8); }
    }
    .bus-label {
      font-family: 'Cinzel', serif; font-size: .85rem;
      color: rgba(249,245,236,0.6); letter-spacing: 3px;
      text-transform: uppercase; margin-top: 4px;
    }

    .divider-line {
      width: 50px; height: 2px;
      background: rgba(232,185,49,0.3);
      margin: 18px auto;
    }

    .passenger-name {
      font-size: 1.35rem; font-weight: 700;
      color: var(--white); margin-bottom: 4px;
    }
    .passenger-info {
      font-size: .88rem; color: rgba(249,245,236,0.6);
    }

    .seat-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(232,185,49,0.15);
      border: 1px solid rgba(232,185,49,0.35);
      border-radius: 99px; padding: 7px 18px;
      margin-top: 14px;
      font-family: 'Cinzel', serif; font-size: .9rem;
      color: var(--gold);
    }

    .actions {
      display: flex; flex-direction: column; gap: 10px;
      width: 100%; max-width: 420px;
      animation: fadeUp .6s 1.1s ease both;
    }

    .btn {
      padding: 14px 20px; border-radius: 10px;
      font-family: 'Cinzel', serif; font-size: .95rem;
      font-weight: 600; letter-spacing: 1px;
      cursor: pointer; border: none;
      transition: transform .2s, box-shadow .2s;
      text-decoration: none; display: block; text-align: center;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-gold {
      background: linear-gradient(135deg, var(--gold), #d4a017);
      color: var(--deep-blue);
      box-shadow: 0 6px 20px rgba(232,185,49,0.4);
    }
    .btn-gold:hover { box-shadow: 0 10px 28px rgba(232,185,49,0.6); }
    .btn-ghost {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.2);
      color: var(--white);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.13); }

    .spinner {
      width: 22px; height: 22px; display: inline-block;
      border: 3px solid rgba(232,185,49,0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-wrap { text-align: center; padding: 60px 0; }

    .error-state {
      background: rgba(192,57,43,0.2);
      border: 1px solid rgba(192,57,43,0.4);
      border-radius: 12px; padding: 20px 24px;
      color: #ff8a7a; font-size: .9rem; line-height: 1.6;
      max-width: 420px; width: 100%; margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="bg-overlay"></div>

  <main class="page">

    <!-- Loading state -->
    <div id="loadingState" class="loading-wrap">
      <div class="spinner"></div>
      <p style="color:rgba(249,245,236,0.6);margin-top:12px">Vérification du paiement…</p>
    </div>

    <!-- Success state -->
    <div id="successState" style="display:none;width:100%;flex-direction:column;align-items:center">

      <!-- Checkmark SVG -->
      <div class="checkmark-wrap">
        <svg viewBox="0 0 52 52" width="90" height="90">
          <circle class="checkmark-circle" cx="26" cy="26" r="25"/>
          <path class="checkmark-check" d="M14 27 l8 8 l16-16"/>
        </svg>
      </div>

      <h1 class="success-title">Place Confirmée !</h1>
      <p class="success-sub">Votre paiement a été validé avec succès.</p>

      <div class="bus-card">
        <div class="bus-number" id="busNum">–</div>
        <div class="bus-label">Votre Bus</div>
        <div class="divider-line"></div>
        <div class="passenger-name" id="paxName">–</div>
        <div class="passenger-info" id="paxPhone">–</div>
        <div class="seat-pill">
          🪑 Siège N° <span id="seatNum">–</span>
        </div>
      </div>

      <div class="actions">
        <a href="list.html" class="btn btn-gold">📋 Voir la Liste des Bus</a>
        <a href="index.html" class="btn btn-ghost">← Retour à l'accueil</a>
      </div>
    </div>

    <!-- Error state -->
    <div id="errorState" style="display:none;width:100%;flex-direction:column;align-items:center">
      <div class="error-state" id="errorMsg"></div>
      <div class="actions" style="margin-top:0">
        <a href="index.html" class="btn btn-ghost">← Retour à l'accueil</a>
      </div>
    </div>

  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');
    const busNum = params.get('bus');
    const seatNum= params.get('seat');
    const name   = params.get('name');

    async function init() {
      if (token && busNum && seatNum && name) {
        showSuccess({ bus_number: busNum, seat_number: seatNum, name: decodeURIComponent(name), phone: '' });
        return;
      }

      if (token) {
        try {
          const res = await fetch('/api/confirm', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token })
          });
          const data = await res.json();
          if (data.success) {
            showSuccess(data.reservation);
          } else {
            showError(data.error || 'Confirmation impossible.');
          }
        } catch(e) {
          showError('Erreur de connexion. Réessayez.');
        }
        return;
      }

      showError('Aucun token de réservation trouvé. Retournez à l\'accueil.');
    }

    function showSuccess(r) {
      document.getElementById('loadingState').style.display = 'none';
      const el = document.getElementById('successState');
      el.style.display = 'flex';

      document.getElementById('busNum').textContent  = `Bus ${r.bus_number}`;
      document.getElementById('paxName').textContent = r.name;
      document.getElementById('paxPhone').textContent= r.phone ? `📱 ${r.phone}` : '';
      document.getElementById('seatNum').textContent = r.seat_number;
    }

    function showError(msg) {
      document.getElementById('loadingState').style.display = 'none';
      const el = document.getElementById('errorState');
      el.style.display = 'flex';
      document.getElementById('errorMsg').textContent = '⚠️ ' + msg;
    }

    init();
  </script>
</body>
</html>
